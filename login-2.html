<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sunkar Finance — Вход</title>
  <meta name="theme-color" content="#060D1F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sunkar Finance">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="apple-touch-icon" href="img/apple-touch.png">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #060D1F;
      --bg2: #0A1428;
      --card: rgba(255,255,255,0.05);
      --green: #00E676;
      --blue: #2979FF;
      --white: #FFFFFF;
      --gray: rgba(255,255,255,0.45);
      --gray2: rgba(255,255,255,0.2);
      --border: rgba(255,255,255,0.08);
      --border-focus: rgba(0,230,118,0.5);
      --error: #FF5252;
      --radius: 18px;
      --radius-sm: 14px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      overflow: hidden;
    }

    /* Фон */
    .bg-glow {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
    }
    .bg-glow-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(41,121,255,0.15), transparent 70%);
      top: -100px; right: -100px;
    }
    .bg-glow-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(0,230,118,0.08), transparent 70%);
      bottom: -80px; left: -80px;
    }

    /* Логотип */
    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
      animation: fadeDown 0.5s ease both;
    }
    .logo-img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 24px rgba(0,230,118,0.25));
    }
    .logo-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 1.5px;
      background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }
    .logo-platform {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* Разделитель */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      margin: 0 auto 32px;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    /* Карточка формы */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px 28px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      animation: fadeUp 0.55s ease 0.05s both;
      position: relative;
    }

    /* Тонкая зелёная линия сверху карточки */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      opacity: 0.6;
    }

    .form-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    /* Поля */
    .field {
      margin-bottom: 14px;
      position: relative;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--gray);
      margin-bottom: 8px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 15px 18px;
      color: var(--white);
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      letter-spacing: 0.01em;
    }
    .field input::placeholder {
      color: var(--gray2);
      font-weight: 500;
    }
    .field input:focus {
      border-color: var(--border-focus);
      background: rgba(0,230,118,0.03);
      box-shadow: 0 0 0 3px rgba(0,230,118,0.07);
    }

    /* Кнопка */
    .btn {
      width: 100%;
      margin-top: 22px;
      padding: 17px;
      background: linear-gradient(135deg, #00C853 0%, #2979FF 100%);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'Unbounded', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0,200,83,0.2);
    }
    .btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,200,83,0.3); }
    .btn:active { transform: translateY(0); opacity: 1; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none; flex-shrink: 0;
    }
    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { opacity: 0.75; }

    /* Ошибка */
    .notice {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
      display: none;
    }
    .notice.error {
      background: rgba(255,82,82,0.08);
      border: 1px solid rgba(255,82,82,0.25);
      color: #FF6B6B;
      display: block;
    }

    /* Подпись снизу */
    .footer-note {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      color: var(--gray2);
      line-height: 1.6;
    }

    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }

    @media (max-width: 420px) {
      .card { padding: 28px 20px 24px; }
      .logo-img { width: 62px; height: 62px; }
      .logo-name { font-size: 15px; }
    }
  </style>
</head>
<body>

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="logo-section">
    <img src="img/logo-full.png" alt="Sunkar Finance" class="logo-img">
    <div class="logo-name">SUNKAR FINANCE</div>
    <div class="logo-platform">Финансовая платформа</div>
  </div>

  <div class="divider"></div>

  <div class="card">
    <div class="form-title">Авторизация</div>

    <div class="field">
      <label>Имя</label>
      <input type="text" id="inp-name" placeholder="Алибек" autocomplete="given-name">
    </div>

    <div class="field">
      <label>Номер телефона</label>
      <input type="tel" id="inp-phone" placeholder="+7 000 000 00 00" autocomplete="tel">
    </div>

    <button class="btn" id="btn" onclick="handleSubmit()">
      <div class="spinner"></div>
      <span class="btn-text">Войти</span>
    </button>

    <div class="notice" id="notice"></div>

    <div class="footer-note">
      Введите данные для авторизации
    </div>
  </div>

  <script>
    const SUPABASE_URL      = 'https://yfkifwujrjugtooodnbp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_v7s8h7vwh0-b_Qq8IFnXOQ_Sa1fa3zd';

    // Уже входил — сразу на главную
    if (localStorage.getItem('sf_user')) {
      window.location.replace('index.html');
    }

    // Форматирование телефона
    document.getElementById('inp-phone').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '');
      if (v.startsWith('8')) v = '7' + v.slice(1);
      if (v.startsWith('7') && v.length > 1) {
        let d = v.slice(1);
        let f = '+7';
        if (d.length > 0) f += ' ' + d.slice(0,3);
        if (d.length > 3) f += ' ' + d.slice(3,6);
        if (d.length > 6) f += ' ' + d.slice(6,8);
        if (d.length > 8) f += ' ' + d.slice(8,10);
        e.target.value = f;
      }
    });

    async function handleSubmit() {
      const name  = document.getElementById('inp-name').value.trim();
      const phone = document.getElementById('inp-phone').value.trim();
      const btn   = document.getElementById('btn');

      if (!name)  { showError('Введите ваше имя'); return; }
      if (!phone || phone.replace(/\D/g,'').length < 11) {
        showError('Введите корректный номер телефона'); return;
      }

      btn.disabled = true;
      btn.classList.add('loading');

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
          },
          body: JSON.stringify({ name, phone, last_seen: new Date().toISOString() })
        });

        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();

        localStorage.setItem('sf_user', JSON.stringify({
          id: data[0].id, name: data[0].name, phone: data[0].phone
        }));

        // Уведомление в Telegram — ждём ответа потом редирект
        var now = new Date().toLocaleString('ru-KZ', {timeZone:'Asia/Almaty', day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
        var msg = '🔔 Новый пользователь — Sunkar Finance\n\n👤 Имя: ' + name + '\n📞 Телефон: ' + phone + '\n🕐 Время: ' + now;
        try {
          await fetch('https://api.telegram.org/bot8700897545:AAFTLaWyct2qVuyAZBT6n0K-GA6k-hZ91kY/sendMessage', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: '8324612405', text: msg})
          });
        } catch(e) {}

        window.location.replace('index.html');

      } catch(err) {
        console.error(err);
        showError('Ошибка соединения. Попробуйте ещё раз.');
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    function showError(msg) {
      const n = document.getElementById('notice');
      n.className = 'notice error';
      n.textContent = '⚠ ' + msg;
    }
  </script>

</body>
</html>
